<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Itinerary</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body { margin: 0; background: #08090f; }
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .itinerary-anim {
        animation: fadeSlideIn 0.35s ease forwards;
      }
      @keyframes dotPulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.3); }
      }
      @keyframes clockPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
      }
      .spain-flag-bar {
        background: linear-gradient(180deg, #c60b1e 28%, #f1bf00 28% 72%, #c60b1e 72%);
        border-radius: 3px;
      }
      .weather-card {
        transition: all 0.3s ease;
      }
      .weather-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px #C9A84C22;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;

      const spainItinerary = [
        {
          day: 1,
          title: "Arrival in Barcelona",
          city: "Barcelona",
          emoji: "🌅",
          activities: [
            { icon: "✈", text: "Meet & greet at Barcelona Airport" },
            { icon: "🏨", text: "Transfer to hotel · freshen up & relax" },
            { icon: "🍽", text: "Lunch at an Indian restaurant" },
            { icon: "🗺", text: "4-hour guided city tour — La Rambla · Plaça de Catalunya · Columbus Monument · Passeig de Gràcia (photo stop at Gaudí's Casa Batlló)" },
            { icon: "💃", text: "Traditional Flamenco Show" },
            { icon: "🥃", text: "Dinner at an Indian restaurant · Black Label · 1 Veg + 1 Non-Veg starter" },
            { icon: "🌙", text: "Overnight stay in Barcelona" },
          ]
        },
        {
          day: 2,
          title: "Montserrat Excursion",
          city: "Barcelona · Montserrat",
          emoji: "⛰",
          activities: [
            { icon: "☕", text: "Breakfast at the hotel" },
            { icon: "🚞", text: "Full-day excursion to Montserrat · one-way by cogwheel train" },
            { icon: "⛪", text: "Visit the famous Montserrat Monastery — Benedictine retreat with breathtaking mountain landscapes" },
            { icon: "🚡", text: "Funicular ride to the summit · panoramic views & walking trails" },
            { icon: "🍽", text: "Lunch at a local restaurant near the monastery" },
            { icon: "🎉", text: "Gala Dinner at an Indian restaurant (2 hrs) · Free flow of Black Label, Absolut Vodka, Bacardi Rum, Beer & Soft Drinks · 2 Veg + 2 Non-Veg snacks · DJ" },
            { icon: "🌙", text: "Overnight stay in Barcelona" },
          ]
        },
        {
          day: 3,
          title: "Barcelona Explorations",
          city: "Barcelona",
          emoji: "🏛",
          activities: [
            { icon: "☕", text: "Breakfast at the hotel" },
            { icon: "⛪", text: "Visit Sagrada Família (entrance tickets included)" },
            { icon: "🍽", text: "Lunch at an Indian restaurant" },
            { icon: "⛵", text: "Barcelona Harbour Cruise (non-exclusive)" },
            { icon: "🛍", text: "Free time for shopping on La Rambla" },
            { icon: "🥃", text: "Dinner at an Indian restaurant · Black Label · 1 Veg + 1 Non-Veg starter" },
            { icon: "🌙", text: "Overnight stay in Barcelona" },
          ]
        },
        {
          day: 4,
          title: "Barcelona → Madrid",
          city: "Barcelona · Madrid",
          emoji: "🚄",
          activities: [
            { icon: "☕", text: "Breakfast at the hotel · check-out" },
            { icon: "🚄", text: "Board high-speed train to Madrid" },
            { icon: "🏨", text: "Arrival in Madrid · transfer to hotel" },
            { icon: "🍽", text: "Lunch at an Indian restaurant" },
            { icon: "⚽", text: "Visit Real Madrid Stadium — Santiago Bernabéu" },
            { icon: "🌆", text: "Madrid City Orientation Tour — Puerta del Sol · Plaza Mayor · Royal Palace (photo stop) · Gran Vía" },
            { icon: "🥃", text: "Dinner at an Indian restaurant · Black Label · 1 Veg + 1 Non-Veg starter" },
            { icon: "🌙", text: "Overnight stay in Madrid" },
          ]
        },
        {
          day: 5,
          title: "Toledo Day Trip",
          city: "Madrid · Toledo",
          emoji: "🏰",
          activities: [
            { icon: "☕", text: "Breakfast at the hotel" },
            { icon: "🏰", text: "Half-day excursion to Toledo — UNESCO World Heritage City" },
            { icon: "⛪", text: "Toledo Cathedral" },
            { icon: "🏘", text: "Old Town · Jewish Quarter" },
            { icon: "🚌", text: "Return to Madrid" },
            { icon: "🥃", text: "Dinner at an Indian restaurant · Black Label · 1 Veg + 1 Non-Veg starter" },
            { icon: "🌙", text: "Overnight stay in Madrid" },
          ]
        },
        {
          day: 6,
          title: "Departure from Madrid",
          city: "Madrid",
          emoji: "🛫",
          activities: [
            { icon: "☕", text: "Breakfast at the hotel · check-out" },
            { icon: "🛍", text: "Free time for last-minute shopping" },
            { icon: "✈", text: "Transfer to Madrid Airport for departure" },
            { icon: "✨", text: "Tour Concluded · ¡Hasta luego!" },
          ]
        },
      ];

      const flights = [
        { id: 1, flight: "EK 503", date: "Mon, 11 May 2026", from: "Mumbai", fromCode: "BOM", to: "Dubai", toCode: "DXB", dep: "19:30", arr: "21:00", duration: "3h 00m", terminal: "T2 → T3", aircraft: "Airbus A350-900", class: "Economy (L)", baggage: "25 kg", meal: "✓ Included", status: "Confirmed", color: "#C9A84C" },
        { id: 2, type: "layover", location: "Dubai (DXB)", duration: "6h 25m", note: "Terminal 3 — Late night connection" },
        { id: 3, flight: "EK 255", date: "Tue, 12 May 2026", from: "Dubai", fromCode: "DXB", to: "Barcelona", toCode: "BCN", dep: "03:25", arr: "08:35", duration: "7h 10m", terminal: "T3 → T1", aircraft: "Boeing 777-200LR", class: "Economy (L)", baggage: "25 kg", meal: "✓ Included", status: "Confirmed", color: "#C9A84C" },
        { id: 4, type: "stay", location: "Spain", duration: "~5 Days", note: "Barcelona → Madrid" },
        { id: 5, flight: "EK 142", date: "Sun, 17 May 2026", from: "Madrid", fromCode: "MAD", to: "Dubai", toCode: "DXB", dep: "15:25", arr: "00:35+1", duration: "7h 10m", terminal: "T4S → T3", aircraft: "Airbus A380-800", class: "Economy (L)", baggage: "25 kg", meal: "✓ Included", status: "Confirmed", color: "#C9A84C" },
        { id: 6, type: "layover", location: "Dubai (DXB)", duration: "2h 55m", note: "Terminal 3 — Short overnight connection" },
        { id: 7, flight: "EK 504", date: "Mon, 18 May 2026", from: "Dubai", fromCode: "DXB", to: "Mumbai", toCode: "BOM", dep: "03:30", arr: "08:15", duration: "3h 15m", terminal: "T3 → T2", aircraft: "Boeing 777-300ER", class: "Economy (L)", baggage: "25 kg", meal: "✓ Included", status: "Confirmed", color: "#C9A84C" },
      ];

      // ─── Spain Live Clock ────────────────────────────────────────────────────────
      function SpainClock() {
        const [time, setTime] = useState(new Date());

        useEffect(() => {
          const timer = setInterval(() => setTime(new Date()), 1000);
          return () => clearInterval(timer);
        }, []);

        const spainTime = new Date(time.toLocaleString("en-US", { timeZone: "Europe/Madrid" }));
        const hh = String(spainTime.getHours()).padStart(2, "0");
        const mm = String(spainTime.getMinutes()).padStart(2, "0");
        const ss = String(spainTime.getSeconds()).padStart(2, "0");
        const isDay = spainTime.getHours() >= 6 && spainTime.getHours() < 21;

        const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        const dayStr = dayNames[spainTime.getDay()];
        const dateStr = spainTime.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });

        // Spain is CEST (UTC+2) in summer, CET (UTC+1) in winter
        const tzLabel = "CEST · UTC+2";

        return (
          <div style={{
            maxWidth: 620, margin: "0 auto 28px",
            background: "linear-gradient(135deg, #100a00 0%, #1a1200 50%, #0d0800 100%)",
            border: "1px solid #C9A84C44",
            borderRadius: 16,
            padding: "18px 24px",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            boxShadow: "0 4px 32px #C9A84C11, inset 0 1px 0 #C9A84C22",
            position: "relative", overflow: "hidden",
          }}>
            {/* Spanish flag bar on left edge */}
            <div className="spain-flag-bar" style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 4 }} />

            <div>
              <div style={{ fontSize: 9, letterSpacing: 5, color: "#C9A84C99", textTransform: "uppercase", marginBottom: 6 }}>
                {isDay ? "☀️" : "🌙"} Spain · {tzLabel}
              </div>
              <div style={{ fontSize: 9, color: "#7a6a40", letterSpacing: 2, marginBottom: 4 }}>
                {dayStr} · {dateStr}
              </div>
            </div>

            <div style={{ display: "flex", alignItems: "baseline", gap: 0 }}>
              <span style={{
                fontSize: "clamp(30px, 7vw, 46px)", fontWeight: 300, color: "#f5edd8",
                letterSpacing: 2, fontVariantNumeric: "tabular-nums", lineHeight: 1,
              }}>{hh}:{mm}</span>
              <span style={{
                fontSize: "clamp(16px, 3.5vw, 22px)", fontWeight: 300,
                color: "#C9A84C", marginLeft: 3,
                animation: "clockPulse 1s ease-in-out infinite", lineHeight: 1,
              }}>{ss}</span>
            </div>
          </div>
        );
      }

      // ─── Weather Widget ──────────────────────────────────────────────────────────
      const weatherData = {
        barcelona: {
          city: "Barcelona",
          flag: "🌞",
          current: { temp: 18, condition: "Sunny", icon: "☀️" },
          forecast: [
            { day: "Wed", high: 19, rain: 20, icon: "🌤" },
            { day: "Thu", high: 20, rain: 15, icon: "🌤" },
            { day: "Fri", high: 19, rain: 35, icon: "🌦" },
            { day: "Sat", high: 19, rain: 10, icon: "⛅" },
            { day: "Sun", high: 18, rain: 40, icon: "🌦" },
          ]
        },
        madrid: {
          city: "Madrid",
          flag: "🌦",
          current: { temp: 17, condition: "Light Rain", icon: "🌧️" },
          forecast: [
            { day: "Wed", high: 19, rain: 70, icon: "🌧" },
            { day: "Thu", high: 21, rain: 15, icon: "🌤" },
            { day: "Fri", high: 24, rain: 10, icon: "☀️" },
            { day: "Sat", high: 18, rain: 65, icon: "🌧" },
            { day: "Sun", high: 21, rain: 20, icon: "🌤" },
          ]
        }
      };

      function WeatherCard({ data }) {
        return (
          <div className="weather-card" style={{
            flex: 1, minWidth: 0,
            background: "linear-gradient(160deg, #0e1a10 0%, #0a1408 100%)",
            border: "1px solid #3a7a5a44",
            borderRadius: 14,
            overflow: "hidden",
          }}>
            {/* Header */}
            <div style={{
              padding: "14px 16px 10px",
              background: "linear-gradient(135deg, #0f2a18, #0a1f10)",
              borderBottom: "1px solid #3a7a5a22",
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontSize: 9, letterSpacing: 4, color: "#5aaa7a", textTransform: "uppercase", marginBottom: 4 }}>Live Weather</div>
                  <div style={{ fontSize: 15, color: "#d4c9a8", fontWeight: 400 }}>🇪🇸 {data.city}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 28, lineHeight: 1, animation: "float 3s ease-in-out infinite" }}>{data.current.icon}</div>
                  <div style={{ fontSize: "clamp(20px,5vw,26px)", fontWeight: 300, color: "#f5edd8", lineHeight: 1, marginTop: 4 }}>{data.current.temp}°C</div>
                </div>
              </div>
              <div style={{ fontSize: 10, color: "#5aaa7a99", marginTop: 4, letterSpacing: 1 }}>{data.current.condition}</div>
            </div>

            {/* 5-day forecast */}
            <div style={{ padding: "10px 12px" }}>
              <div style={{ fontSize: 8, letterSpacing: 3, color: "#3a6a4a", textTransform: "uppercase", marginBottom: 8 }}>5-Day Forecast</div>
              <div style={{ display: "flex", gap: 4 }}>
                {data.forecast.map((f, i) => (
                  <div key={i} style={{
                    flex: 1, textAlign: "center",
                    padding: "7px 2px",
                    background: i === 0 ? "#3a7a5a18" : "#ffffff04",
                    border: `1px solid ${i === 0 ? "#3a7a5a44" : "#3a7a5a11"}`,
                    borderRadius: 8,
                  }}>
                    <div style={{ fontSize: 8, color: "#5aaa7a88", letterSpacing: 1, marginBottom: 4 }}>{f.day}</div>
                    <div style={{ fontSize: 14, marginBottom: 3 }}>{f.icon}</div>
                    <div style={{ fontSize: 11, color: "#c8d8c0", fontWeight: 500 }}>{f.high}°</div>
                    <div style={{
                      marginTop: 4, height: 2, borderRadius: 1,
                      background: `linear-gradient(90deg, #5aaa7a, #c0606050)`,
                      opacity: f.rain / 100,
                    }} />
                    <div style={{ fontSize: 7, color: "#3a6a4a", marginTop: 2 }}>{f.rain}%</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      function WeatherWidget() {
        return (
          <div style={{ maxWidth: 620, margin: "0 auto 32px" }}>
            <div style={{ fontSize: 9, letterSpacing: 4, color: "#5aaa7a", textTransform: "uppercase", textAlign: "center", marginBottom: 12 }}>
              🌤 Weather in Spain
            </div>
            <div style={{ display: "flex", gap: 12 }}>
              <WeatherCard data={weatherData.barcelona} />
              <WeatherCard data={weatherData.madrid} />
            </div>
            <div style={{ textAlign: "center", marginTop: 8, fontSize: 9, color: "#2a4a3a", letterSpacing: 1 }}>
              Current conditions · Celsius · Updated live
            </div>
          </div>
        );
      }

      // ─── Spain Itinerary ─────────────────────────────────────────────────────────
      function SpainItinerary() {
        const [activeDay, setActiveDay] = useState(null);
        const toggle = (d) => setActiveDay(activeDay === d ? null : d);

        return (
          <div className="itinerary-anim" style={{ borderTop: "1px solid #3a7a5a30", paddingTop: 16 }}>
            <div style={{ fontSize: 9, letterSpacing: 4, color: "#5aaa7a", textTransform: "uppercase", marginBottom: 14, textAlign: "center" }}>Day-by-Day Itinerary</div>
            <div style={{ position: "relative" }}>
              <div style={{ position: "absolute", left: 18, top: 0, bottom: 0, width: 1, background: "linear-gradient(180deg, #3a7a5a44, #5aaa7a55, #3a7a5a44)" }} />

              {spainItinerary.map((day, idx) => {
                const isOpen = activeDay === day.day;
                const isLast = idx === spainItinerary.length - 1;
                return (
                  <div key={day.day} style={{ marginBottom: isLast ? 0 : 6, position: "relative" }}>
                    <div style={{
                      position: "absolute", left: 10, top: 16, width: 16, height: 16, borderRadius: "50%",
                      background: isOpen ? "radial-gradient(circle, #5aaa7a, #2d7a50)" : "radial-gradient(circle, #1a3a2a, #0f2a1a)",
                      border: `1.5px solid ${isOpen ? "#5aaa7a" : "#3a7a5a66"}`,
                      transition: "all 0.3s ease",
                      boxShadow: isOpen ? "0 0 10px #5aaa7a55" : "none",
                      zIndex: 2
                    }} />

                    <div
                      onClick={() => toggle(day.day)}
                      style={{
                        marginLeft: 36,
                        background: isOpen ? "linear-gradient(135deg, #0d2218, #0a1c14)" : "#ffffff04",
                        border: `1px solid ${isOpen ? "#3a7a5a66" : "#3a7a5a2a"}`,
                        borderRadius: 10,
                        overflow: "hidden",
                        cursor: "pointer",
                        transition: "all 0.3s ease",
                      }}
                    >
                      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px" }}>
                        <div style={{
                          width: 32, height: 32, borderRadius: 8,
                          background: isOpen ? "linear-gradient(135deg, #1a4a2a, #0f3a1a)" : "linear-gradient(135deg, #152a1a, #0d1f10)",
                          border: `1px solid ${isOpen ? "#5aaa7a55" : "#3a7a5a33"}`,
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: 16, flexShrink: 0,
                          transition: "all 0.3s ease"
                        }}>{day.emoji}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                            <span style={{ fontSize: 9, letterSpacing: 3, color: "#5aaa7a", textTransform: "uppercase" }}>Day {String(day.day).padStart(2,"0")}</span>
                            <span style={{ fontSize: 11, color: "#4a7a5a" }}>·</span>
                            <span style={{ fontSize: 11, color: "#88aa99", letterSpacing: 0.5 }}>{day.city}</span>
                          </div>
                          <div style={{ fontSize: 13, color: "#c8d8c0", marginTop: 2, fontWeight: 400 }}>{day.title}</div>
                        </div>
                        <div style={{
                          fontSize: 14, color: isOpen ? "#5aaa7a" : "#3a6a4a",
                          transform: isOpen ? "rotate(180deg)" : "rotate(0deg)",
                          transition: "transform 0.3s ease", lineHeight: 1
                        }}>⌄</div>
                      </div>

                      {isOpen && (
                        <div className="itinerary-anim" style={{ borderTop: "1px solid #3a7a5a22", padding: "12px 14px 14px" }}>
                          {day.activities.map((act, i) => (
                            <div key={i} style={{
                              display: "flex", gap: 10, alignItems: "flex-start",
                              padding: "6px 0",
                              borderBottom: i < day.activities.length - 1 ? "1px solid #3a7a5a15" : "none"
                            }}>
                              <div style={{
                                width: 24, height: 24, borderRadius: 6, flexShrink: 0,
                                background: "linear-gradient(135deg, #1a3a22, #0f2a18)",
                                border: "1px solid #3a7a5a30",
                                display: "flex", alignItems: "center", justifyContent: "center",
                                fontSize: 12, marginTop: 1
                              }}>{act.icon}</div>
                              <div style={{ fontSize: 12, color: "#a8c4a8", lineHeight: 1.55, flex: 1 }}>{act.text}</div>
                            </div>
                          ))}
                        </div>
                      )}

                      <div style={{ textAlign: "center", padding: "4px 0", fontSize: 8, color: "#2a5a3a99", letterSpacing: 2 }}>
                        {isOpen ? "TAP TO COLLAPSE" : "TAP FOR DETAILS"}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      // ─── Main Itinerary ──────────────────────────────────────────────────────────
      function Itinerary() {
        const [expanded, setExpanded] = useState(null);
        const [stayOpen, setStayOpen] = useState(false);
        const toggle = (id) => setExpanded(expanded === id ? null : id);

        return (
          <div style={{
            minHeight: "100vh",
            background: "linear-gradient(160deg, #08090f 0%, #0c1320 40%, #0a150d 75%, #0c0e08 100%)",
            fontFamily: "'Georgia', serif", padding: "32px 16px", color: "#e8dfc8",
          }}>
            {/* ── Decorative top stripe ─────────────── */}
            <div className="spain-flag-bar" style={{ position: "fixed", top: 0, left: 0, right: 0, height: 3, zIndex: 999 }} />

            {/* ── Header ───────────────────────────── */}
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ fontSize: 11, letterSpacing: 6, color: "#C9A84C", textTransform: "uppercase", marginBottom: 8 }}>Emirates · Booking</div>
              <h1 style={{
                fontSize: "clamp(22px, 5vw, 36px)", fontWeight: 400, margin: 0,
                color: "#f5edd8", letterSpacing: 1,
                textShadow: "0 0 40px #C9A84C22",
              }}>Mumbai → Barcelona → Mumbai</h1>
              <div style={{ fontSize: 12, color: "#7a8fa8", marginTop: 8, letterSpacing: 2 }}>11 MAY — 18 MAY 2026</div>
              <div style={{ width: 60, height: 1, background: "linear-gradient(90deg, transparent, #C9A84C, transparent)", margin: "20px auto 0" }} />
            </div>

            {/* ── Spain Live Clock ──────────────────── */}
            <SpainClock />

            {/* ── Weather Cards ─────────────────────── */}
            <WeatherWidget />

            {/* ── Flight Timeline ───────────────────── */}
            <div style={{ maxWidth: 620, margin: "0 auto", position: "relative" }}>
              <div style={{ position: "absolute", left: 28, top: 0, bottom: 0, width: 1, background: "linear-gradient(180deg, #C9A84C33, #C9A84C55, #C9A84C33)", zIndex: 0 }} />
              {flights.map((item) => {
                if (item.type === "layover") {
                  return (
                    <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 20, padding: "16px 0", position: "relative", zIndex: 1 }}>
                      <div style={{ width: 56, height: 56, borderRadius: "50%", background: "linear-gradient(135deg, #1a2a3a, #0f1a2a)", border: "1px solid #C9A84C44", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>⏱</div>
                      <div style={{ flex: 1, background: "#ffffff06", border: "1px solid #C9A84C22", borderRadius: 10, padding: "12px 18px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div>
                            <div style={{ fontSize: 10, letterSpacing: 4, color: "#C9A84C", textTransform: "uppercase", marginBottom: 4 }}>Layover</div>
                            <div style={{ fontSize: 15, color: "#d4c9a8" }}>{item.location}</div>
                            <div style={{ fontSize: 11, color: "#556677", marginTop: 4 }}>{item.note}</div>
                          </div>
                          <div style={{ fontSize: 20, fontWeight: 300, color: "#C9A84C", letterSpacing: -0.5 }}>{item.duration}</div>
                        </div>
                      </div>
                    </div>
                  );
                }

                if (item.type === "stay") {
                  return (
                    <div key={item.id} style={{ display: "flex", gap: 20, padding: "8px 0", position: "relative", zIndex: 1 }}>
                      <div
                        onClick={() => setStayOpen(!stayOpen)}
                        style={{
                          width: 56, height: 56, borderRadius: "50%",
                          background: stayOpen ? "linear-gradient(135deg, #1a3a2a, #0d2a18)" : "linear-gradient(135deg, #1a3a2a, #0f2a1a)",
                          border: `1px solid ${stayOpen ? "#5aaa7a88" : "#3a7a5a44"}`,
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: 22, flexShrink: 0, cursor: "pointer",
                          boxShadow: stayOpen ? "0 0 20px #3a7a5a44" : "none",
                          transition: "all 0.3s ease"
                        }}
                      >🇪🇸</div>

                      <div
                        style={{
                          flex: 1,
                          background: stayOpen ? "linear-gradient(135deg, #0f1f17, #0a1a10)" : "linear-gradient(135deg, #0f1f170a, #1a3a2a18)",
                          border: `1px solid ${stayOpen ? "#3a7a5a55" : "#3a7a5a30"}`,
                          borderRadius: 12, overflow: "hidden",
                          cursor: "pointer", transition: "all 0.3s ease", marginBottom: 8
                        }}
                        onClick={() => setStayOpen(!stayOpen)}
                      >
                        <div style={{ padding: "16px 20px" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <div>
                              <div style={{ fontSize: 10, letterSpacing: 4, color: "#5aaa7a", textTransform: "uppercase", marginBottom: 4 }}>Spain Stay</div>
                              <div style={{ fontSize: 15, color: "#d4c9a8" }}>{item.location}</div>
                              <div style={{ display: "flex", gap: 8, marginTop: 6, flexWrap: "wrap" }}>
                                {["Barcelona", "Montserrat", "Toledo", "Madrid"].map(c => (
                                  <span key={c} style={{ fontSize: 9, letterSpacing: 2, color: "#4a8a6a", background: "#3a7a5a18", border: "1px solid #3a7a5a33", borderRadius: 4, padding: "2px 7px", textTransform: "uppercase" }}>{c}</span>
                                ))}
                              </div>
                              <div style={{ fontSize: 11, color: "#556677", marginTop: 6 }}>{item.note}</div>
                            </div>
                            <div style={{ textAlign: "right" }}>
                              <div style={{ fontSize: 22, fontWeight: 300, color: "#5aaa7a", letterSpacing: -0.5 }}>{item.duration}</div>
                              <div style={{ fontSize: 9, color: "#3a6a4a", letterSpacing: 2, marginTop: 4 }}>6 DAYS</div>
                            </div>
                          </div>
                        </div>

                        {stayOpen && (
                          <div style={{ padding: "0 16px 16px" }} onClick={e => e.stopPropagation()}>
                            <SpainItinerary />
                          </div>
                        )}

                        <div style={{ textAlign: "center", padding: "6px", fontSize: 9, color: "#2a5a3a99", letterSpacing: 2 }}>
                          {stayOpen ? "TAP TO COLLAPSE" : "TAP FOR ITINERARY"}
                        </div>
                      </div>
                    </div>
                  );
                }

                const isOpen = expanded === item.id;
                return (
                  <div key={item.id} style={{ display: "flex", gap: 20, padding: "8px 0", position: "relative", zIndex: 1 }}>
                    <div style={{ width: 56, height: 56, borderRadius: "50%", background: "linear-gradient(135deg, #1e2d40, #0f1a2a)", border: "1px solid #C9A84C66", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 11, color: "#C9A84C", fontWeight: 600, letterSpacing: 0.5, cursor: "pointer", boxShadow: isOpen ? "0 0 20px #C9A84C33" : "none", transition: "box-shadow 0.3s ease" }} onClick={() => toggle(item.id)}>✈</div>
                    <div style={{ flex: 1, background: isOpen ? "linear-gradient(135deg, #12202f, #0d1925)" : "#ffffff06", border: `1px solid ${isOpen ? "#C9A84C55" : "#C9A84C22"}`, borderRadius: 12, overflow: "hidden", cursor: "pointer", transition: "all 0.3s ease", marginBottom: 8 }} onClick={() => toggle(item.id)}>
                      <div style={{ padding: "16px 20px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                          <div>
                            <span style={{ fontSize: 10, letterSpacing: 4, color: "#C9A84C", textTransform: "uppercase" }}>{item.flight}</span>
                            <div style={{ fontSize: 11, color: "#55667788", marginTop: 2 }}>{item.date}</div>
                          </div>
                          <div style={{ fontSize: 11, color: "#5a8060", letterSpacing: 1 }}>● {item.status}</div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                          <div style={{ textAlign: "left" }}>
                            <div style={{ fontSize: 26, fontWeight: 300, color: "#f0e8d0", lineHeight: 1 }}>{item.dep}</div>
                            <div style={{ fontSize: 12, color: "#8899aa", marginTop: 4 }}>{item.fromCode}</div>
                            <div style={{ fontSize: 10, color: "#556677" }}>{item.from}</div>
                          </div>
                          <div style={{ flex: 1, textAlign: "center" }}>
                            <div style={{ fontSize: 10, color: "#7a8899", marginBottom: 4 }}>{item.duration}</div>
                            <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                              <div style={{ flex: 1, height: 1, background: "linear-gradient(90deg, #C9A84C44, #C9A84C88)" }} />
                              <span style={{ color: "#C9A84C", fontSize: 12 }}>›</span>
                              <div style={{ flex: 1, height: 1, background: "linear-gradient(90deg, #C9A84C88, #C9A84C44)" }} />
                            </div>
                            <div style={{ fontSize: 9, color: "#445566", marginTop: 4, letterSpacing: 2 }}>NON STOP</div>
                          </div>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 26, fontWeight: 300, color: "#f0e8d0", lineHeight: 1 }}>{item.arr}</div>
                            <div style={{ fontSize: 12, color: "#8899aa", marginTop: 4 }}>{item.toCode}</div>
                            <div style={{ fontSize: 10, color: "#556677" }}>{item.to}</div>
                          </div>
                        </div>
                      </div>
                      {isOpen && (
                        <div style={{ borderTop: "1px solid #C9A84C22", padding: "14px 20px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px 20px" }}>
                          {[["Terminal", item.terminal], ["Aircraft", item.aircraft], ["Class", item.class], ["Baggage", item.baggage], ["Meal", item.meal]].map(([label, val]) => (
                            <div key={label}>
                              <div style={{ fontSize: 9, letterSpacing: 3, color: "#667788", textTransform: "uppercase" }}>{label}</div>
                              <div style={{ fontSize: 13, color: "#c8bfa0", marginTop: 2 }}>{val}</div>
                            </div>
                          ))}
                        </div>
                      )}
                      <div style={{ textAlign: "center", padding: "6px", fontSize: 9, color: "#33445555", letterSpacing: 2 }}>{isOpen ? "TAP TO COLLAPSE" : "TAP FOR DETAILS"}</div>
                    </div>
                  </div>
                );
              })}
            </div>

            <div style={{ textAlign: "center", marginTop: 32 }}>
              <div style={{ fontSize: 10, color: "#334455AA" }}>Total CO₂ emissions · 1,034.89 kg</div>
            </div>
          </div>
        );
      }

      // ─── Suggestions Widget ───────────────────────────────────────────────────
      const LS_KEY = "spain-trip-suggestions-v1";

      function loadFromLS() {
        try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
        catch (_) { return []; }
      }

      function saveToLS(data) {
        try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (_) {}
      }

      function SuggestionsWidget() {
        const [open, setOpen]           = React.useState(false);
        const [name, setName]           = React.useState("");
        const [text, setText]           = React.useState("");
        const [suggestions, setSuggestions] = React.useState(() => loadFromLS());
        const [pulse, setPulse]         = React.useState(false);
        const [votes, setVotes]         = React.useState(() => {
          try { return JSON.parse(localStorage.getItem(LS_KEY + "-votes")) || {}; }
          catch (_) { return {}; }
        });

        const saveVotes = (v) => {
          setVotes(v);
          try { localStorage.setItem(LS_KEY + "-votes", JSON.stringify(v)); } catch (_) {}
        };

        const handleSubmit = () => {
          if (!name.trim() || !text.trim()) return;
          const newEntry = {
            id: Date.now().toString(),
            name: name.trim(),
            text: text.trim(),
            ts: Date.now(),
            likes: 0,
            dislikes: 0,
          };
          const updated = [newEntry, ...suggestions];
          setSuggestions(updated);
          saveToLS(updated);
          setName("");
          setText("");
          setPulse(true);
          setTimeout(() => setPulse(false), 500);
        };

        const handleVote = (id, type) => {
          const already = votes[id];
          if (already === type) {
            const newVotes = { ...votes };
            delete newVotes[id];
            saveVotes(newVotes);
            const updated = suggestions.map(s =>
              s.id === id ? { ...s, [type + "s"]: Math.max(0, s[type + "s"] - 1) } : s
            );
            setSuggestions(updated);
            saveToLS(updated);
          } else {
            const newVotes = { ...votes, [id]: type };
            saveVotes(newVotes);
            const updated = suggestions.map(s => {
              if (s.id !== id) return s;
              const opposite = type === "like" ? "dislikes" : "likes";
              return {
                ...s,
                [type + "s"]: s[type + "s"] + 1,
                [opposite]: already ? Math.max(0, s[opposite] - 1) : s[opposite],
              };
            });
            setSuggestions(updated);
            saveToLS(updated);
          }
        };

        const formatTime = (ts) => {
          const d = new Date(ts);
          return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" }) +
            " · " + d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
        };

        const inputStyle = {
          width: "100%", boxSizing: "border-box",
          background: "#ffffff08", border: "1px solid #C9A84C33",
          borderRadius: 8, padding: "9px 12px",
          color: "#e8dfc8", fontSize: 13, fontFamily: "'Georgia', serif",
          outline: "none", resize: "none",
          transition: "border-color 0.2s ease",
        };

        const canPost = name.trim().length > 0 && text.trim().length > 0;

        return (
          <>
            <button
              onClick={() => setOpen(!open)}
              style={{
                position: "fixed", bottom: 24, right: 20, zIndex: 1000,
                width: 54, height: 54, borderRadius: "50%",
                background: open
                  ? "linear-gradient(135deg, #1a2030, #0f1520)"
                  : "linear-gradient(135deg, #C9A84C, #a8843a)",
                border: `1.5px solid ${open ? "#C9A84C88" : "#C9A84Caa"}`,
                boxShadow: `0 4px 24px ${open ? "#0008" : "#C9A84C55"}`,
                cursor: "pointer", display: "flex", alignItems: "center",
                justifyContent: "center", fontSize: 22,
                transition: "all 0.3s ease",
                transform: pulse ? "scale(1.18)" : "scale(1)",
              }}
              title="Suggestions"
            >
              {open
                ? <span style={{ color: "#C9A84C", fontSize: 18, lineHeight: 1 }}>✕</span>
                : "💬"
              }
              {!open && suggestions.length > 0 && (
                <span style={{
                  position: "absolute", top: -4, right: -4,
                  width: 18, height: 18, borderRadius: "50%",
                  background: "#C9A84C", border: "2px solid #0a0f1e",
                  fontSize: 9, color: "#0a0f1e", fontWeight: 700,
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>{suggestions.length > 9 ? "9+" : suggestions.length}</span>
              )}
            </button>

            {open && (
              <div
                className="itinerary-anim"
                style={{
                  position: "fixed", bottom: 88, right: 16, zIndex: 999,
                  width: "min(370px, calc(100vw - 32px))",
                  background: "linear-gradient(160deg, #0d1525 0%, #0a1020 100%)",
                  border: "1px solid #C9A84C44",
                  borderRadius: 16,
                  boxShadow: "0 8px 48px #00000088, 0 0 0 1px #C9A84C11",
                  overflow: "hidden",
                  maxHeight: "72vh",
                  display: "flex", flexDirection: "column",
                }}
              >
                <div style={{
                  padding: "16px 18px 14px",
                  borderBottom: "1px solid #C9A84C22",
                  background: "linear-gradient(135deg, #12202f, #0d1925)",
                  flexShrink: 0,
                }}>
                  <div style={{ fontSize: 9, letterSpacing: 5, color: "#C9A84C", textTransform: "uppercase", marginBottom: 4 }}>Public Board</div>
                  <div style={{ fontSize: 15, color: "#f0e8d0", fontWeight: 400 }}>Suggestions & Notes</div>
                  <div style={{ fontSize: 11, color: "#556677", marginTop: 3 }}>Saved on this device · shared with the group</div>
                </div>

                <div style={{ padding: "14px 16px 12px", borderBottom: "1px solid #C9A84C18", flexShrink: 0 }}>
                  <input
                    placeholder="Your name"
                    value={name}
                    onChange={e => setName(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && canPost && handleSubmit()}
                    style={{ ...inputStyle, marginBottom: 8 }}
                    onFocus={e => e.target.style.borderColor = "#C9A84C88"}
                    onBlur={e => e.target.style.borderColor = "#C9A84C33"}
                  />
                  <textarea
                    placeholder="Share a suggestion, tip, or note…"
                    value={text}
                    onChange={e => setText(e.target.value)}
                    rows={3}
                    style={{ ...inputStyle, marginBottom: 10, lineHeight: 1.5 }}
                    onFocus={e => e.target.style.borderColor = "#C9A84C88"}
                    onBlur={e => e.target.style.borderColor = "#C9A84C33"}
                  />
                  <button
                    onClick={handleSubmit}
                    disabled={!canPost}
                    style={{
                      width: "100%", padding: "10px 0",
                      background: canPost
                        ? "linear-gradient(135deg, #C9A84C, #a8843a)"
                        : "linear-gradient(135deg, #1e2a3a, #151f2a)",
                      border: `1px solid ${canPost ? "#C9A84Caa" : "#C9A84C33"}`,
                      borderRadius: 8,
                      color: canPost ? "#0a0f1e" : "#445566",
                      fontSize: 11, letterSpacing: 3, textTransform: "uppercase",
                      fontFamily: "'Georgia', serif",
                      cursor: canPost ? "pointer" : "default",
                      transition: "all 0.25s ease", fontWeight: 700,
                    }}
                  >
                    Post Suggestion
                  </button>
                </div>

                <div style={{ overflowY: "auto", flex: 1, padding: "8px 0" }}>
                  {suggestions.length === 0 ? (
                    <div style={{ textAlign: "center", padding: "32px 20px" }}>
                      <div style={{ fontSize: 26, marginBottom: 10 }}>✉️</div>
                      <div style={{ fontSize: 11, color: "#445566", letterSpacing: 2 }}>NO SUGGESTIONS YET</div>
                      <div style={{ fontSize: 11, color: "#334455", marginTop: 6 }}>Be the first to post!</div>
                    </div>
                  ) : (
                    suggestions.map((s, i) => {
                      const myVote = votes[s.id];
                      return (
                        <div
                          key={s.id || i}
                          style={{
                            margin: "6px 12px",
                            background: i === 0 ? "linear-gradient(135deg, #12202f, #0d1925)" : "#ffffff05",
                            border: `1px solid ${i === 0 ? "#C9A84C44" : "#C9A84C18"}`,
                            borderRadius: 10, padding: "11px 13px",
                          }}
                        >
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                              <div style={{
                                width: 26, height: 26, borderRadius: "50%",
                                background: "linear-gradient(135deg, #1e2d40, #0f1a2a)",
                                border: "1px solid #C9A84C55",
                                display: "flex", alignItems: "center", justifyContent: "center",
                                fontSize: 11, color: "#C9A84C", fontWeight: 700, flexShrink: 0,
                              }}>
                                {s.name.charAt(0).toUpperCase()}
                              </div>
                              <span style={{ fontSize: 12, color: "#c8bfa0" }}>{s.name}</span>
                              {i === 0 && (
                                <span style={{ fontSize: 8, letterSpacing: 2, color: "#C9A84C", background: "#C9A84C18", border: "1px solid #C9A84C33", borderRadius: 4, padding: "1px 5px" }}>NEW</span>
                              )}
                            </div>
                            <span style={{ fontSize: 9, color: "#445566", letterSpacing: 0.5, flexShrink: 0 }}>{formatTime(s.ts)}</span>
                          </div>

                          <div style={{ fontSize: 12, color: "#8899aa", lineHeight: 1.6, marginBottom: 10 }}>{s.text}</div>

                          <div style={{ display: "flex", gap: 8 }}>
                            {[
                              { type: "like",    emoji: "👍", count: s.likes    || 0, activeColor: "#5aaa7a", activeBg: "#1a3a2a", activeBorder: "#5aaa7a55" },
                              { type: "dislike", emoji: "👎", count: s.dislikes || 0, activeColor: "#c06060", activeBg: "#2a1a1a", activeBorder: "#c0606055" },
                            ].map(({ type, emoji, count, activeColor, activeBg, activeBorder }) => {
                              const active = myVote === type;
                              return (
                                <button
                                  key={type}
                                  onClick={() => handleVote(s.id, type)}
                                  style={{
                                    display: "flex", alignItems: "center", gap: 5,
                                    padding: "4px 10px", borderRadius: 6, cursor: "pointer",
                                    background: active ? activeBg : "#ffffff08",
                                    border: `1px solid ${active ? activeBorder : "#C9A84C18"}`,
                                    color: active ? activeColor : "#556677",
                                    fontSize: 11, fontFamily: "'Georgia', serif",
                                    transition: "all 0.2s ease",
                                  }}
                                >
                                  <span style={{ fontSize: 13 }}>{emoji}</span>
                                  <span style={{ fontWeight: active ? 600 : 400 }}>{count}</span>
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>

                {suggestions.length > 0 && (
                  <div style={{ textAlign: "center", padding: "8px 0 10px", fontSize: 9, color: "#2a3a4a", letterSpacing: 2, borderTop: "1px solid #C9A84C18", flexShrink: 0 }}>
                    {suggestions.length} SUGGESTION{suggestions.length !== 1 ? "S" : ""}
                  </div>
                )}
              </div>
            )}
          </>
        );
      }

      function App() {
        return (
          <>
            <Itinerary />
            <SuggestionsWidget />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
